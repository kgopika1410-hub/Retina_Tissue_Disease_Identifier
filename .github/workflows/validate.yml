name: Validate Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax
      run: |
        python -m py_compile dr_inference_app.py
        python -m py_compile dr_backend_api.py
        python -m py_compile dr_model_utils.py
    
    - name: Verify deployment files
      run: |
        test -f Procfile && echo "✓ Procfile found"
        test -f render.yaml && echo "✓ render.yaml found"
        test -f .gitignore && echo "✓ .gitignore found"
        test -f requirements.txt && echo "✓ requirements.txt found"
    
    - name: Import modules
      run: |
        python -c "import tensorflow; print(f'TensorFlow {tensorflow.__version__}')"
        python -c "import gradio; print(f'Gradio {gradio.__version__}')"
        python -c "import fastapi; print(f'FastAPI available')"
        python -c "import cv2; print(f'OpenCV available')"
    
    - name: Check file sizes (for repo limits)
      run: |
        echo "Checking for large files..."
        find . -type f -size +50M 2>/dev/null | head -20 || echo "No files >50MB found"
