services:
  - type: web
    name: dr-classifier
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dr_inference_app.py
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        scope: run_and_build
        value: 10000
      - key: GRADIO_SERVER_PORT
        scope: run_and_build
        value: 10000
